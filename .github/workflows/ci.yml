name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  syntax:
    name: syntax (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run repo hygiene check
        run: npm run test:repo-hygiene

      - name: Run syntax checks
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test_reports/ci
          npm run test:syntax 2>&1 | tee test_reports/ci/syntax-node${{ matrix.node-version }}.log

      - name: Upload syntax logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: syntax-node${{ matrix.node-version }}-logs
          path: test_reports/ci/syntax-node${{ matrix.node-version }}.log
          if-no-files-found: error
          retention-days: 14

  unit:
    name: unit (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand({ ping: 1 })\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      MONGO_URL: mongodb://127.0.0.1:27017/omnifm_ci
      DB_NAME: omnifm_ci
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test_reports/ci
          npm run test:unit 2>&1 | tee test_reports/ci/unit-node${{ matrix.node-version }}.log

      - name: Upload unit logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-node${{ matrix.node-version }}-logs
          path: test_reports/ci/unit-node${{ matrix.node-version }}.log
          if-no-files-found: error
          retention-days: 14

  mongo-smoke:
    name: mongo smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand({ ping: 1 })\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      MONGO_URL: mongodb://127.0.0.1:27017/omnifm_ci
      DB_NAME: omnifm_ci
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run Mongo smoke test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test_reports/ci
          node --input-type=module -e "const db = await import('./src/lib/db.js'); await db.connect(); if (!db.getDb()) throw new Error('Mongo connection failed'); await db.close();" 2>&1 | tee test_reports/ci/mongo-smoke.log

      - name: Upload Mongo smoke log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mongo-smoke-log
          path: test_reports/ci/mongo-smoke.log
          if-no-files-found: error
          retention-days: 14

  frontend-build:
    name: frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../test_reports/ci
          : > ../test_reports/ci/frontend-build.log
          npm ci 2>&1 | tee -a ../test_reports/ci/frontend-build.log
          npm run build 2>&1 | tee -a ../test_reports/ci/frontend-build.log
        working-directory: frontend

      - name: Upload frontend build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build-log
          path: test_reports/ci/frontend-build.log
          if-no-files-found: error
          retention-days: 14

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Build container
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test_reports/ci
          docker build -t omnifm-ci . 2>&1 | tee test_reports/ci/docker-build.log

      - name: Upload docker build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-build-log
          path: test_reports/ci/docker-build.log
          if-no-files-found: error
          retention-days: 14
