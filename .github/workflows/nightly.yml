name: nightly-regression

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      run_docker:
        description: Build the Docker image during this run
        required: false
        default: true
        type: boolean

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  regression:
    name: regression (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand({ ping: 1 })\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      MONGO_URL: mongodb://127.0.0.1:27017/omnifm_ci
      DB_NAME: omnifm_ci
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run full regression suite
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test_reports/ci
          npm test 2>&1 | tee test_reports/ci/nightly-regression-node${{ matrix.node-version }}.log

      - name: Upload nightly regression logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-regression-node${{ matrix.node-version }}-logs
          path: test_reports/ci/nightly-regression-node${{ matrix.node-version }}.log
          if-no-files-found: error
          retention-days: 21

  recovery-focus:
    name: recovery-focus
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand({ ping: 1 })\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      MONGO_URL: mongodb://127.0.0.1:27017/omnifm_ci
      DB_NAME: omnifm_ci
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run recovery-focused tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test_reports/ci
          node --test test/pricing-and-runtime.test.js test/web-server-dashboard.test.js test/weekly-digest.test.js 2>&1 | tee test_reports/ci/nightly-recovery-focus.log

      - name: Upload recovery-focused logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-recovery-focus-log
          path: test_reports/ci/nightly-recovery-focus.log
          if-no-files-found: error
          retention-days: 21

  frontend-build:
    name: nightly frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../test_reports/ci
          : > ../test_reports/ci/nightly-frontend-build.log
          npm ci 2>&1 | tee -a ../test_reports/ci/nightly-frontend-build.log
          npm run build 2>&1 | tee -a ../test_reports/ci/nightly-frontend-build.log
        working-directory: frontend

      - name: Upload nightly frontend build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-frontend-build-log
          path: test_reports/ci/nightly-frontend-build.log
          if-no-files-found: error
          retention-days: 21

  docker-build:
    name: nightly docker build
    if: ${{ github.event_name == 'schedule' || inputs.run_docker }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Build container
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test_reports/ci
          docker build -t omnifm-nightly . 2>&1 | tee test_reports/ci/nightly-docker-build.log

      - name: Upload nightly docker build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-docker-build-log
          path: test_reports/ci/nightly-docker-build.log
          if-no-files-found: error
          retention-days: 21
