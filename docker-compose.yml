services:
  mongodb:
    image: mongo:7
    container_name: omnifm-mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - MONGO_INITDB_DATABASE=radio_bot

  omnifm:
    build: .
    container_name: omnifm
    init: true
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=radio_bot
    ports:
      - "${WEB_PORT:-8081}:${WEB_INTERNAL_PORT:-8080}"
    volumes:
      - ./.env:/app/.env
      - ./stations.json:/app/stations.json
      - ./premium.json:/app/premium.json
      - ./bot-state.json:/app/bot-state.json
      - ./custom-stations.json:/app/custom-stations.json
      - ./command-permissions.json:/app/command-permissions.json
      - ./guild-languages.json:/app/guild-languages.json
      - ./song-history.json:/app/song-history.json
      - ./dashboard.json:/app/dashboard.json
      - ./listening-stats.json:/app/listening-stats.json
      - ./scheduled-events.json:/app/scheduled-events.json
      - ./coupons.json:/app/coupons.json
      - ./discordbotlist.json:/app/discordbotlist.json
      - ./botsgg.json:/app/botsgg.json
      - ./topgg.json:/app/topgg.json
      - ./vote-events.json:/app/vote-events.json
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      # Fix: curl statt node als Health-Check-Binary (schneller, kein ~200ms Node-Startup)
      # curl wird jetzt explizit im Dockerfile installiert
      test:
        [
          "CMD",
          "curl",
          "--silent",
          "--fail",
          "--max-time", "5",
          "http://127.0.0.1:${WEB_INTERNAL_PORT:-8080}/api/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
