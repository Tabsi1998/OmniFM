<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="robots" content="noindex,nofollow"/>
  <title>404 – Seite nicht gefunden | OmniFM</title>
  <link rel="icon" type="image/png" href="/img/bot-1.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#050505;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden}
    .glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none}
    .glow-cyan{background:#00F0FF;width:500px;height:500px;top:-200px;left:50%;transform:translateX(-50%);opacity:.08}
    .glow-purple{background:#BD00FF;width:300px;height:300px;bottom:-100px;right:-100px;opacity:.06}
    .container{position:relative;z-index:1;max-width:480px}
    .eq{display:flex;align-items:flex-end;gap:3px;height:40px;justify-content:center;margin-bottom:32px}
    .eq-bar{width:4px;border-radius:2px 2px 0 0;background:linear-gradient(to top,#00F0FF,#BD00FF)}
    @keyframes eq{0%,100%{height:20%}50%{height:100%}}
    .code{font-family:'Orbitron',sans-serif;font-size:clamp(72px,15vw,120px);font-weight:800;line-height:1;color:#00F0FF;text-shadow:0 0 40px rgba(0,240,255,0.3);margin-bottom:16px}
    .title{font-family:'Orbitron',sans-serif;font-size:clamp(16px,4vw,22px);font-weight:700;margin-bottom:12px;letter-spacing:.03em}
    .sub{font-size:15px;color:#A1A1AA;line-height:1.6;margin-bottom:36px}
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn-home{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:999px;background:#fff;color:#050505;font-weight:700;font-size:14px;text-decoration:none;transition:transform .2s,box-shadow .2s;box-shadow:0 0 20px rgba(255,255,255,0.1)}
    .btn-home:hover{transform:scale(1.05)}
    .btn-dash{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:999px;background:transparent;color:#fff;font-weight:600;font-size:14px;text-decoration:none;border:1px solid rgba(255,255,255,0.15);transition:background .2s}
    .btn-dash:hover{background:rgba(255,255,255,0.06)}
    .noise{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="glow glow-cyan"></div>
  <div class="glow glow-purple"></div>
  <div class="container">
    <div class="eq" id="eq"></div>
    <div class="code">404</div>
    <h1 class="title">Frequenz nicht gefunden</h1>
    <p class="sub">Diese Seite existiert nicht oder wurde verschoben.<br>Vielleicht hilft dir die Startseite weiter.</p>
    <div class="actions">
      <a href="/" class="btn-home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Zur Startseite
      </a>
      <a href="/dashboard" class="btn-dash">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
    </div>
  </div>
  <script>
    var eq = document.getElementById('eq');
    var heights = [0.4,0.7,0.5,0.9,0.6,0.8,0.3,0.7,0.5,0.6,0.8,0.4];
    heights.forEach(function(h,i){
      var bar = document.createElement('div');
      bar.className = 'eq-bar';
      bar.style.height = (h*100)+'%';
      bar.style.animation = 'eq '+(0.6+Math.random()*0.8).toFixed(2)+'s ease-in-out '+(i*0.08).toFixed(2)+'s infinite';
      eq.appendChild(bar);
    });
  </script>
</body>
</html>
